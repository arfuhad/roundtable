name: Release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    name: Build & publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/roundtable-cli/
    permissions:
      id-token: write   # OIDC token for PyPI Trusted Publishing — no API token stored
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Verify the release tag matches the package version
        run: |
          version=$(grep -m1 '^version = ' pyproject.toml | sed -E 's/^version = "(.*)"$/\1/')
          tag="${GITHUB_REF_NAME#v}"
          echo "package version: $version  ·  release tag: $tag"
          [ "$version" = "$tag" ] || { echo "::error::release tag '$tag' != pyproject version '$version'"; exit 1; }
      - name: Build distributions
        run: uv build
      - name: Check metadata
        run: uvx twine check dist/*
      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
