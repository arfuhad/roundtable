  <circle cx="102" cy="78" r="7" fill="#ef4444"/>
  <circle cx="126" cy="78" r="7" fill="#f59e0b"/>
  <circle cx="150" cy="78" r="7" fill="#22c55e"/>
  <text x="184" y="84" font-family="SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="15" fill="#cbd5e1">roundtable watch --project .</text>

