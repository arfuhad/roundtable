<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Roundtable terminal watch preview</title>
  <desc id="desc">A terminal watch view showing progress, active tasks, usage, phase status, and recent events.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#020617" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="1280" height="760" fill="#e5e7eb"/>
  <rect x="72" y="54" width="1136" height="652" rx="18" fill="#020617" filter="url(#shadow)"/>
